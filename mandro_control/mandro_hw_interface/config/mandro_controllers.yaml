# Definition of joints used by hardware
hardware_interface:
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint7
    - joint6

# Publish all joint states for ROS
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 1000

arm_controller:
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint7
  gains:
    joint1: {p: 12.0, i: 1.0, d: 0.01,    antiwindup: True}
    joint2: {p: 13.0, i: 1.0, d: 0.005,   antiwindup: True}
    joint3: {p: 14.0, i: 1.0, d: 0.00001, antiwindup: True}
    joint4: {p: 25.0, i: 1.0, d: 0.001,   antiwindup: True}
    joint5: {p: 10.0, i: 1.0, d: 0.001,   antiwindup: True}
    joint7: {p: 10.0, i: 1.0, d: 0.001,   antiwindup: True}
  constraints: 
    goal_time: 0.5
  state_publish_rate:  250 # Defaults to 50
  action_monitor_rate: 250 # Defaults to 50
  # hold_trajectory_duration: 0 # Defaults to 0.5

gripper_controller:
  type: position_controllers/GripperActionController
  joint: joint6
  state_publish_rate:  250
  action_monitor_rate: 250

joint_group_controller:
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint7
  gains:
    joint1: {p: 12.0, i: 1.0, d: 0.01,    antiwindup: True}
    joint2: {p: 13.0, i: 1.0, d: 0.005,   antiwindup: True}
    joint3: {p: 14.0, i: 1.0, d: 0.00001, antiwindup: True}
    joint4: {p: 25.0, i: 1.0, d: 0.001,   antiwindup: True}
    joint5: {p: 10.0, i: 1.0, d: 0.001,   antiwindup: True}
    joint7: {p: 10.0, i: 1.0, d: 0.001,   antiwindup: True}
  state_publish_rate:  250 # Defaults to 50
  action_monitor_rate: 250 # Defaults to 50
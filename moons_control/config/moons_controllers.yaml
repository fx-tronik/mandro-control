# Definition of joints used by hardware
hardware_interface:
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint7
    - joint6

# Publish all joint states for ROS
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 1000

arm_controller:
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint7
  gains:
    joint1: {p: 20.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint2: {p: 18.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint3: {p: 20.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint4: {p: 20.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint5: {p: 30.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint7: {p: 10.0, i: 1.0,  d: 1.0,   i_clamp: 1.0,  antiwindup: True}
  velocity_ff:
    joint1: 0.0
    joint2: 0.0
    joint3: 0.0
    joint4: 0.0
    joint5: 0.0
  constraints: 
    joint1: {trajectory: 0.15, goal: 0.3}
    joint2: {trajectory: 0.02, goal: 0.3}
    joint3: {trajectory: 0.4,  goal: 0.3}
    joint4: {trajectory: 0.4,  goal: 0.3}
    joint5: {trajectory: 0.25, goal: 0.3}
    goal_time: 0.3
  stop_trajectory_duration: 0.3
  state_publish_rate:  250  # Defaults to 50
  action_monitor_rate: 50   # Defaults to 20

gripper_controller:
  type: "position_controllers/JointTrajectoryController"
  joints:
    - joint6
  constraints:
    goal_time: 5.0
  state_publish_rate:  250
  action_monitor_rate: 50

joint_group_controller:
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint7
  gains:
    joint1: {p: 20.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint2: {p: 18.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint3: {p: 20.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint4: {p: 20.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint5: {p: 30.0, i: 0.01, d: 0.001, i_clamp: 0.01, antiwindup: True}
    joint7: {p: 1.0,  i: 1.0,  d: 1.0,   i_clamp: 1.0,  antiwindup: True}
  state_publish_rate:  250 # Defaults to 50
  action_monitor_rate: 50 # Defaults to 20
